###############################################################
# Grafana dashboard provisioning config
# Tells Grafana where to find dashboard JSON files
###############################################################

apiVersion: 1

providers:
  - name: "GeoCloud Fleet Dashboards"
    orgId: 1
    folder: "GeoCloud Fleet"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
